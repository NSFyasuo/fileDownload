<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <title>文件共享服务器</title>
</head>
<body>
    <h1>文件共享服务器</h1>

    <div id="auth">
        <h2>登录</h2>
        <form id="loginForm">
            <input type="text" name="username" placeholder="用户名" required>
            <input type="password" name="password" placeholder="密码" required>
            <button type="submit">登录</button>
        </form>
        <h2>注册</h2>
        <form id="registerForm">
            <input type="text" name="username" placeholder="用户名" required>
            <input type="password" name="password" placeholder="密码" required>
            <button type="submit">注册</button>
        </form>
    </div>

    <div id="main" style="display:none;">
        <h2>上传文件</h2>
        <form id="uploadForm" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit">上传</button>
        </form>
        <h2>我的文件</h2>
        <button onclick="loadFiles()">加载文件</button>
        <ul id="fileList"></ul>
        <h2>下载文件</h2>
        <input type="number" id="fileId" placeholder="文件ID">
        <button onclick="downloadFile()">下载</button>
        <h2>分享文件</h2>
        <input type="number" id="shareFileId" placeholder="文件ID">
        <button onclick="shareFile()">分享</button>
        <div id="shareLink"></div>
        <h2>通过分享链接下载</h2>
        <input type="text" id="shareLinkInput" placeholder="分享链接">
        <button onclick="downloadShared()">下载分享文件</button>
    </div>

    <script>
        let token = localStorage.getItem('token');

        if (token) {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('main').style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const response = await fetch('/login', {
                method: 'POST',
                body: new URLSearchParams(formData)
            });
            if (response.ok) {
                const data = await response.json();
                token = data.token;
                localStorage.setItem('token', token);
                document.getElementById('auth').style.display = 'none';
                document.getElementById('main').style.display = 'block';
            } else {
                alert('登录失败');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const response = await fetch('/register', {
                method: 'POST',
                body: new URLSearchParams(formData)
            });
            if (response.ok) {
                alert('注册成功，请登录');
            } else {
                alert('注册失败');
            }
        });

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const response = await fetch('/upload', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
                body: formData
            });
            if (response.ok) {
                alert('上传成功');
                loadFiles(); // Reload files after upload
            } else {
                alert('上传失败');
            }
        });

        async function loadFiles() {
            const response = await fetch('/files', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (response.ok) {
                const files = await response.json();
                const list = document.getElementById('fileList');
                list.innerHTML = '';
                files.forEach(file => {
                    const li = document.createElement('li');
                    li.textContent = `${file.filename} (ID: ${file.id})`;
                    list.appendChild(li);
                });
            } else {
                alert('加载文件失败');
            }
        }

        function downloadFile() {
            const id = document.getElementById('fileId').value;
            window.location.href = `/download?id=${id}`;
        }

        async function shareFile() {
            const id = document.getElementById('shareFileId').value;
            const response = await fetch(`/share?id=${id}`, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (response.ok) {
                const data = await response.json();
                document.getElementById('shareLink').innerHTML = `分享链接: ${window.location.origin}/shared?link=${data.link}`;
            } else {
                alert('分享失败');
            }
        }

        function downloadShared() {
            const link = document.getElementById('shareLinkInput').value;
            window.location.href = `/shared?link=${link}`;
        }
    </script>
</body>
</html>
